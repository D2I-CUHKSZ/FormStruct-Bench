data_root: ./FormTSR/datasets
layout_root: ./newdataset-layout
difficulty_csv: outputs/domain_stats/normal_calibrated_difficulty_sample_levels.csv
output_dir: outputs/main_exp
index_path: outputs/main_exp/dataset_index.jsonl
schema_max_files: 25
compact_structure: false

metric_weights:
  TSR-path: 0.20
  VAcc: 0.20
  R-F1: 0.20
  LIG-F1: 0.20
  WAcc: 0.20

models:
  - name: gpt_vlm
    provider: openai_vlm
    group: vlm
    model: gpt-5.5
    enabled: true
    batch_size: 8
    temperature: 0
    max_tokens: 32768
    timeout_seconds: 240
    retries: 1
    retry_backoff_seconds: 120

  - name: claude_vlm
    provider: anthropic_vlm
    group: vlm
    model: claude-sonnet-5
    enabled: true
    batch_size: 2
    temperature: 0
    max_tokens: 8192

  - name: gemini_vlm
    provider: gemini_vlm
    group: vlm
    model: gemini-3.5-flash
    enabled: true
    batch_size: 2
    temperature: 0
    max_tokens: 8192

  - name: Qwen3.6-35B-A3B
    provider: local_sglang_server_vlm
    group: vlm
    model: Qwen3.6-35B-A3B
    enabled: false
    batch_size: 64
    concurrency: 64
    dp_size: 2
    server_start_timeout_seconds: 1200
    request_timeout_seconds: 1800
    temperature: 0
    max_tokens: 8192
    timeout_seconds: 43200
    base_url: "http://127.0.0.1:30000"
    command: "./.venv/bin/python scripts/sglang_vlm_infer.py --base-url http://127.0.0.1:30000 --timeout 1500 --retries 1 --retry-sleep 5"
    batch_command: "PYTHONPATH=./scripts/sglang_stubs ./.venv/bin/python scripts/sglang_vlm_offline_batch.py --model-path /path/to/data/model/Qwen/Qwen3.6-35B-A3B"
    env:
      CUDA_HOME: "/path/to/data/cuda-12.8"
      SGLANG_MODEL_PATH: "/path/to/data/model/Qwen/Qwen3.6-35B-A3B"
      FLASHINFER_NVCC: "/path/to/data/cuda-12.8/bin/nvcc"
      NVCC_PREPEND_FLAGS: "-ccbin /usr/bin/g++-13"
      FORMTSR_SERVED_MODEL: "qwen3_6_35b_a3b"
      SGLANG_MAX_TOKENS: "12288"
      SGLANG_TEMPERATURE: "0"
      SGLANG_ENABLE_THINKING: "false"
      SGLANG_CONTEXT_LENGTH: "24576"
      SGLANG_KV_CACHE_DTYPE: "auto"
      SGLANG_MAX_TOTAL_TOKENS: "32768"
      SGLANG_MEM_FRACTION_STATIC: "0.92"
      SGLANG_SUBMIT_MODE: "async"
      SGLANG_DP_SIZE: "2"
      SGLANG_MAX_INFLIGHT_REQUESTS: "64"
      SGLANG_MAX_RUNNING_REQUESTS: "64"
      SGLANG_MAX_QUEUED_REQUESTS: "256"
      SGLANG_CHUNKED_PREFILL_SIZE: "8192"
      SGLANG_MAX_PREFILL_TOKENS: "24576"
      SGLANG_SCHEDULE_CONSERVATIVENESS: "0.8"
      SGLANG_CUDA_GRAPH_MAX_BS: "64"
