data_root: raw/srfund/extracted/dataset
output_dir: outputs/srfund_transfer_locked400/eval
index_path: outputs/srfund_transfer_locked400/split/index.jsonl
schema_max_files: 25
compact_structure: false

metric_weights:
  TSR-path: 0.34
  VAcc: 0.33
  R-F1: 0.00
  LIG-F1: 0.00
  WAcc: 0.33

models:
  - name: qwen36_35b_pre_sft_locked400
    provider: external_vllm_server_vlm
    group: vlm
    model: Qwen3.6-35B-A3B
    served_model: qwen36_locked_pre_sft
    enabled: true
    batch_size: 8
    concurrency: 8
    request_timeout_seconds: 1800
    retries: 1
    retry_backoff_seconds: 10
    temperature: 0
    max_tokens: 14336
    response_format: json_schema
    response_format_style: structured_outputs
    response_json_schema_name: formtsr_hierarchical_v2
    prompt_variant: hierarchical_full
    include_chat_template_kwargs: true
    base_url: "http://127.0.0.1:8000"
    fail_fast_server_errors: true
    env:
      SGLANG_ENABLE_THINKING: "false"

  - name: qwen36_35b_sft_step100_locked400
    provider: external_vllm_server_vlm
    group: vlm
    model: Qwen3.6-35B-A3B-FormStruct-SFT-step100
    served_model: qwen36_locked_step100
    enabled: true
    batch_size: 8
    concurrency: 8
    request_timeout_seconds: 1800
    retries: 1
    retry_backoff_seconds: 10
    temperature: 0
    max_tokens: 14336
    response_format: json_schema
    response_format_style: structured_outputs
    response_json_schema_name: formtsr_hierarchical_v2
    prompt_variant: hierarchical_full
    include_chat_template_kwargs: true
    base_url: "http://127.0.0.1:8000"
    fail_fast_server_errors: true
    env:
      SGLANG_ENABLE_THINKING: "false"
