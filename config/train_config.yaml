model:
  model_name_or_path: /root/autodl-tmp/Qwen3-VL-Embedding-8B
  instruction: Represent the image for fine-grained image retrieval.
  normalize: true
  attn_implementation: sdpa

train:
  seed: 42
  output_dir: /root/autodl-tmp/qwen3_vl_embedding_lora
  num_train_epochs: 2
  learning_rate: 5.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.05
  lr_scheduler_type: cosine
  max_grad_norm: 1.0
  logging_steps: 20
  eval_steps: 100
  save_steps: 100
  gradient_accumulation_steps: 8
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  dataloader_num_workers: 2
  gradient_checkpointing: true
  bf16: true
  fp16: false

lora:
  enable: true
  r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj

data:
  train_manifest: data/train_exclude_7classes.jsonl
  val_manifest: data/val_exclude_7classes.jsonl
  test_manifest: data/test_7classes.jsonl
  image_root: /root/autodl-fs/data-new
  negatives_per_anchor: 1
  hard_negative_ratio: 0.4

loss:
  temperature: 0.05

eval:
  topk:
    - 1
    - 5
    - 10
